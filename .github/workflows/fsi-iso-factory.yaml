name: FSI Hardened ISO Factory

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_TAG: quay.io/nyanavila/fsi-hardened-os:latest
  # Force Podman to write credentials to a specific, accessible path
  AUTH_FILE: ${{ github.workspace }}/containers-auth.json

jobs:
  iso-factory:
    runs-on: self-hosted
    permissions:
      contents: read
    
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Prune Runner Storage Layer
        run: |
          sudo podman system prune -a -f --volumes
          sudo rm -rf ./reports ./output
          # Remove any stale auth files from previous runs
          sudo rm -f $AUTH_FILE

      - name: Authenticate to Registries
        run: |
          # Use the env variable to force the token location for both logins
          echo "${{ secrets.QUAY_PASSWORD }}" | sudo REGISTRY_AUTH_FILE=$AUTH_FILE podman login quay.io -u "${{ secrets.QUAY_USERNAME }}" --password-stdin
          echo "${{ secrets.RH_REGISTRY_PASSWORD }}" | sudo REGISTRY_AUTH_FILE=$AUTH_FILE podman login registry.redhat.io -u "${{ secrets.RH_REGISTRY_USER }}" --password-stdin

      - name: Build Hardened Bootc Image
        run: |
          # Pass the auth file context to the build and push steps
          sudo REGISTRY_AUTH_FILE=$AUTH_FILE podman build --no-cache -t $IMAGE_TAG -f Containerfile.new .
          sudo REGISTRY_AUTH_FILE=$AUTH_FILE podman push $IMAGE_TAG

      - name: Pre-Boot Compliance Scan (Digital Autopsy)
        run: |
          mkdir -p reports
          sudo podman run --rm -v "$(pwd)/reports:/reports:Z" $IMAGE_TAG /bin/bash -c "
            oscap xccdf eval --profile pci-dss \
              --report /reports/pci_dss_compliance.html \
              /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
          " || echo "Compliance processing completed with findings."

      - name: Compile Bootable ISO Artifact
        run: |
          mkdir -p output
          sudo REGISTRY_AUTH_FILE=$AUTH_FILE podman pull $IMAGE_TAG
          
          # Mount our explicitly generated workspace auth file directly into the expected location inside the builder
          sudo podman run --privileged --rm \
            -v /dev:/dev \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "$(pwd)/output:/output:Z" \
            -v "$AUTH_FILE:/root/.docker/config.json:ro" \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            $IMAGE_TAG
            
          sudo mv ./output/iso/install.iso ./fsi-hardened-rhel9.iso

      - name: Upload Compliance and Installation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fsi-gold-master-iso
          path: |
            reports/pci_dss_compliance.html
            fsi-hardened-rhel9.iso
          retention-days: 2
