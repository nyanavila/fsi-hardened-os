name: FSI Hardened ISO Factory

on:
  push:
    branches: [ "main" ]

env:
  # FIXED: Pointing to your exact 'navila' Quay namespace
  IMAGE_TAG: quay.io/navila/fsi-hardened-os:latest
  AUTH_FILE: ${{ github.workspace }}/containers-auth.json

jobs:
  iso-factory:
    runs-on: self-hosted
    permissions:
      contents: read
    
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Prune Runner Storage Layer
        run: |
          sudo podman system prune -a -f --volumes
          sudo rm -rf ./reports ./output
          sudo rm -f $AUTH_FILE

      - name: Authenticate to Registries
        run: |
          # FIXED: Swapped username string to match your real Quay robot name 'navila+navila'
          echo "${{ secrets.QUAY_PASSWORD }}" | sudo podman login quay.io -u "navila+navila" --password-stdin --authfile=$AUTH_FILE
          echo "${{ secrets.RH_REGISTRY_PASSWORD }}" | sudo podman login registry.redhat.io -u "${{ secrets.RH_REGISTRY_USER }}" --password-stdin --authfile=$AUTH_FILE
      
      - name: Build Hardened Bootc Image
        run: |
          sudo podman build --no-cache --authfile=$AUTH_FILE -t $IMAGE_TAG -f Containerfile.new .
          sudo podman push --authfile=$AUTH_FILE $IMAGE_TAG

      - name: Pre-Boot Compliance Scan (Digital Autopsy)
        run: |
          mkdir -p reports
          sudo podman run --rm -v "$(pwd)/reports:/reports:Z" $IMAGE_TAG /bin/bash -c "
            oscap xccdf eval --profile pci-dss \
              --report /reports/pci_dss_compliance.html \
              /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
          " || echo "Compliance processing completed with findings."

      - name: Compile Bootable ISO Artifact
        run: |
          mkdir -p output
          sudo podman pull --authfile=$AUTH_FILE $IMAGE_TAG
          
          sudo podman run --privileged --rm \
            -v /dev:/dev \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v "$(pwd)/output:/output:Z" \
            -v "$AUTH_FILE:/root/.docker/config.json:ro" \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            $IMAGE_TAG

          # DYNAMIC FIX: Find any ISO generated anywhere inside the output folder and move it safely
          find ./output -name "*.iso" -exec mv {} ./fsi-hardened-rhel9.iso \;
          
          # Verification check for the demo log visibility
          ls -lh ./fsi-hardened-rhel9.iso
          #sudo mv ./output/iso/install.iso ./fsi-hardened-rhel9.iso

      - name: Upload Compliance and Installation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fsi-gold-master-iso
          path: |
            reports/pci_dss_compliance.html
            fsi-hardened-rhel9.iso
          retention-days: 2
