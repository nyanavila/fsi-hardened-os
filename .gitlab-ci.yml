stages:
  - build
  - security_scan
  - sign

variables:
  # This creates a unique tag for every single build
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  # Required for Podman on GitLab SaaS Shared Runners
  #STORAGE_DRIVER: "vfs"
  # Ensures auth persists correctly between commands
  REGISTRY_AUTH_FILE: "$CI_PROJECT_DIR/.auth.json"

  # Force Podman to use the project directory for temporary storage
  # rather than the limited /var/lib/containers/storage
  PODMAN_RUN_DIR: "$CI_PROJECT_DIR/.podman_runtime"
  PODMAN_TMPDIR: "$CI_PROJECT_DIR/.podman_tmp"
#before_script:
    # Aggressively clear local runner storage before starting
 #   - podman system prune -a -f --volumes
  #  - podman rmi -a -f || true  


build_os:
  stage: build
  image: quay.io/podman/stable:latest
  script:
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Diagnostic: This will fail the job immediately if variables are truly missing
    - if [ -z "${RH_REGISTRY_USER}" ]; then echo "RH_REGISTRY_USER is empty"; exit 1; fi
    
    # Use single quotes to escape special characters in Service Account names
    - podman login -u "${RH_REGISTRY_USER}" -p "${RH_REGISTRY_PASSWORD}" registry.redhat.io
    
    # Ensure the build uses the authenticated session to pull the RHEL base
    - |
      podman build --no-cache \
        --build-arg REDHAT_ORG_ID="${REDHAT_ORG_ID}" \
        --build-arg REDHAT_ACTIVATION_KEY="${REDHAT_ACTIVATION_KEY}" \
        -t "${IMAGE_TAG}" \
        -f Containerfile.new . 
    - podman push "$IMAGE_TAG"    
compliance_scan:
  stage: security_scan
  image: quay.io/podman/stable:latest
  script:
    - podman pull --creds "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" "$IMAGE_TAG"
    
    # Run a robust scan script inside the container
    - |
      podman run --rm -v "$(pwd):/reports:Z" "$IMAGE_TAG" /bin/bash -c '
        # 1. Dynamically find the DataStream file (tries RHEL 9, then CentOS 9)
        SCAP_FILE=$(ls /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml 2>/dev/null || ls /usr/share/xml/scap/ssg/content/ssg-centos9-ds.xml 2>/dev/null)
        
        if [ -z "$SCAP_FILE" ]; then
          echo "ERROR: SCAP content not found in /usr/share/xml/scap/ssg/content/"
          ls -R /usr/share/xml/scap/ssg/content/
          exit 1
        fi
        
        echo "Using SCAP content: $SCAP_FILE"
        
        # 2. Execute the scan
        oscap-chroot / "$SCAP_FILE" \
          --profile pci-dss \
          --report /reports/audit_report.html
      '
  artifacts:
    paths:
      - audit_report.html
    expire_in: 1 week
    when: always

sign_os_image:
  stage: sign
  image: alpine:latest
  script:
    - apk add --no-cache cosign
    - echo "$COSIGN_KEY" > cosign.key
    # Sign and push the signature back to GitLab
    - cosign login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - cosign sign --key cosign.key --tlog-upload=false "$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
