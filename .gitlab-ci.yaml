stages:
  - build
  - security_scan
  - sign

variables:
  # This creates a unique tag for every single build
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
- echo "Pulling from $CI_REGISTRY as $CI_REGISTRY_USER for image $IMAGE_TAG"
# 1. BUILD: The "Manufacturing" Stage
build_os:
  stage: build
  image: quay.io/podman/stable
  script:
    # Authenticate to your project's local registry
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    # Build the image using the Containerfile and the .toml files
    - podman build -t $IMAGE_TAG .
    # Push the "Golden Image" to the registry
    - podman push $IMAGE_TAG

# 2. TEST: The "Audit" Stage
# This ensures the image meets FSI security standards before it can be signed.
compliance_scan:
  stage: security_scan
  image: quay.io/podman/stable
  variables:
    STORAGE_DRIVER: "vfs"
    # Create a local auth file path to avoid permission issues
    REGISTRY_AUTH_FILE: "$CI_PROJECT_DIR/.auth.json"
  script:
    # 1. Force Podman to create a fresh auth file with the Job Token
    # Using --authfile ensures the Authorization header is stored and sent to /jwt/auth
    - podman login --authfile $REGISTRY_AUTH_FILE -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    
    # 2. Use the authfile explicitly during the pull
    - podman pull --authfile $REGISTRY_AUTH_FILE $IMAGE_TAG
    
    # 3. Clean up (Optional, for security hygiene)
    - rm -f $REGISTRY_AUTH_FILE
    
    # 4. Proceed with OpenSCAP
    - podman run --rm $IMAGE_TAG ls /usr/lib/bootc/kargs.d/01-fips.toml
    - podman run --rm $IMAGE_TAG oscap-chroot / /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml --profile pci-dss --report audit_report.html || true
  artifacts:
    paths:
      - audit_report.html

# 3. SIGN: The "Notary" Stage
# Only images that pass the above stages get the 'Seal of Approval'
sign_os_image:
  stage: sign
  image: alpine:latest
  script:
    # Install the cosign tool
    - apk add --no-cache cosign
    # Use the private key stored in GitLab Variables to sign the image
    - echo "$COSIGN_KEY" > cosign.key
    - cosign sign --key cosign.key --tlog-upload=false $IMAGE_TAG
  only:
    - main # Only sign images built from the production (main) branch