stages:
  - build
  - test
  - sign

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA

# 1. BUILD
build_os:
  stage: build
  image: quay.io/podman/stable
  script:
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - podman build -t $IMAGE_TAG .
    - podman push $IMAGE_TAG

# 2. TEST (Renamed stage here to match the stages list)
compliance_scan:
  stage: test
  image: quay.io/podman/stable
  script:
    - podman login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - podman pull $IMAGE_TAG
    - podman run --rm $IMAGE_TAG ls /usr/lib/bootc/kargs.d/01-fips.toml
    # Note: Using '|| true' allows the report to be generated even if some audit items fail
    - podman run --rm $IMAGE_TAG oscap-chroot / /usr/share/xml/scap/ssg/content/ssg-centos9-ds.xml --profile pci-dss --report audit_report.html || true
  artifacts:
    paths:
      - audit_report.html
    expire_in: 1 week

# 3. SIGN
sign_os_image:
  stage: sign
  image: alpine:latest
  script:
    - apk add --no-cache cosign
    - echo "$COSIGN_KEY" > cosign.key
    - cosign sign --key cosign.key --tlog-upload=false $IMAGE_TAG
  only:
    - main